<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tutor Weekly Session Log</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --color-bg: #F4F1EC;
    --color-surface: #FDFCFA;
    --color-brand: #C25B3F;
    --color-brand-muted: #FAF0EC;
    --color-brand-dark: #9E3D24;
    --color-text: #1C1917;
    --color-muted: #78716C;
    --color-border: #E2DDD8;
    --color-success: #3D7A5F;
    --color-success-muted: #EAF4EF;
    --color-danger: #C0392B;
    --font-main: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --radius-card: 14px;
    --radius-input: 8px;
    --shadow-card: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-main);
    background: var(--color-bg);
    min-height: 100vh;
    padding: 40px 16px 60px;
    color: var(--color-text);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #C25B3F08 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 700px; margin: 0 auto; position: relative; z-index: 1; }

  .header { margin-bottom: 32px; padding: 0 4px; }
  .header-eyebrow {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--color-brand);
    margin-bottom: 8px;
  }
  .header h1 { font-size: 2rem; font-weight: 700; color: var(--color-text); line-height: 1.15; }
  .header p { color: var(--color-muted); margin-top: 8px; font-size: 0.95rem; }

  .card {
    background: var(--color-surface);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
    border: 1px solid var(--color-border);
    padding: 24px;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--color-muted);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    display: block;
    width: 3px; height: 14px;
    background: var(--color-brand);
    border-radius: 2px;
  }

  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--color-text);
    margin-bottom: 6px;
  }

  input, select, textarea {
    width: 100%;
    padding: 10px 13px;
    border: 1.5px solid var(--color-border);
    border-radius: var(--radius-input);
    font-size: 0.93rem;
    font-family: var(--font-main);
    color: var(--color-text);
    background: var(--color-bg);
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--color-brand);
    box-shadow: 0 0 0 3px rgba(194,91,63,0.12);
    background: var(--color-surface);
  }
  input[readonly] {
    background: var(--color-bg);
    color: var(--color-muted);
    font-family: var(--font-mono);
    font-size: 0.85rem;
    cursor: default;
  }
  textarea { resize: vertical; min-height: 68px; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .row.three { grid-template-columns: 1fr 1fr 1fr; }

  .date-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }

  .day-btn {
    display: flex; flex-direction: column; align-items: center;
    padding: 11px 4px 9px;
    border: 1.5px solid var(--color-border);
    border-radius: 10px;
    cursor: pointer;
    background: var(--color-bg);
    transition: all 0.18s;
    position: relative;
  }
  .day-btn .day-label {
    font-size: 0.65rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--color-muted); margin-bottom: 4px;
  }
  .day-btn .day-num {
    font-size: 1.05rem; font-weight: 700;
    color: var(--color-text); font-family: var(--font-mono);
  }
  .day-btn:hover:not(.active) { border-color: var(--color-brand); background: var(--color-brand-muted); }
  .day-btn.active { border-color: var(--color-brand); background: var(--color-brand); }
  .day-btn.active .day-label,
  .day-btn.active .day-num { color: white; }
  .day-btn.has-sessions .day-num::after {
    content: ''; display: block;
    width: 5px; height: 5px;
    border-radius: 50%; background: var(--color-success);
    margin: 3px auto 0;
  }
  .day-btn.active.has-sessions .day-num::after { background: rgba(255,255,255,0.8); }

  .day-panel { display: none; animation: slideIn 0.22s ease; }
  .day-panel.open { display: block; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .day-panel-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; padding-bottom: 12px;
    border-bottom: 1px solid var(--color-border);
  }
  .day-panel-title { font-size: 0.95rem; font-weight: 700; }
  .close-day {
    background: none; border: none; cursor: pointer;
    color: var(--color-muted); font-size: 0.85rem;
    padding: 4px 8px; border-radius: 6px;
    font-family: var(--font-main);
    transition: color 0.15s, background 0.15s;
  }
  .close-day:hover { color: var(--color-danger); background: #FEF2F2; }

  .session-block {
    border: 1.5px solid var(--color-border);
    border-radius: 10px; padding: 16px;
    margin-bottom: 12px; background: var(--color-bg);
  }
  .session-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
  }
  .session-label {
    font-family: var(--font-mono); font-size: 0.72rem; font-weight: 500;
    color: var(--color-brand); letter-spacing: 0.06em; text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  .dur-badge {
    background: var(--color-brand-muted); color: var(--color-brand-dark);
    font-size: 0.72rem; font-weight: 600;
    padding: 2px 8px; border-radius: 99px; font-family: var(--font-mono);
  }
  .remove-btn {
    background: none; border: none; cursor: pointer;
    color: var(--color-muted); font-size: 0.8rem;
    padding: 3px 8px; border-radius: 6px; font-family: var(--font-main);
    transition: color 0.15s, background 0.15s;
  }
  .remove-btn:hover { color: var(--color-danger); background: #FEF2F2; }

  /* Travel options */
  .travel-options {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 8px; margin-bottom: 14px;
  }
  .travel-option { position: relative; }
  .travel-option input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
  .travel-option label {
    display: flex; flex-direction: column; align-items: center;
    padding: 10px 8px;
    border: 1.5px solid var(--color-border); border-radius: 9px;
    cursor: pointer; background: var(--color-bg);
    transition: all 0.18s; text-align: center;
    font-size: 0.8rem; font-weight: 600; color: var(--color-muted);
    gap: 4px; margin-bottom: 0;
  }
  .travel-option label .travel-icon { font-size: 1.2rem; }
  .travel-option label .travel-fee {
    font-family: var(--font-mono); font-size: 0.7rem;
    color: var(--color-muted); font-weight: 400;
  }
  .travel-option input:checked + label {
    border-color: var(--color-brand); background: var(--color-brand-muted); color: var(--color-brand-dark);
  }
  .travel-option input:checked + label .travel-fee { color: var(--color-brand); }
  .travel-option label:hover { border-color: var(--color-brand); background: var(--color-brand-muted); }

  .add-session-btn {
    width: 100%; padding: 10px;
    border: 1.5px dashed var(--color-border); border-radius: 9px;
    background: transparent; color: var(--color-muted);
    font-size: 0.88rem; font-weight: 600; font-family: var(--font-main);
    cursor: pointer; transition: all 0.18s; margin-top: 4px;
  }
  .add-session-btn:hover {
    border-color: var(--color-brand); color: var(--color-brand-dark); background: var(--color-brand-muted);
  }

  .summary-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; margin-bottom: 16px; }
  .summary-table th {
    background: var(--color-brand-muted); color: var(--color-brand-dark);
    font-weight: 700; padding: 9px 10px; text-align: left;
    font-size: 0.73rem; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .summary-table td { padding: 9px 10px; border-bottom: 1px solid var(--color-border); vertical-align: top; }
  .summary-table tr:last-child td { border-bottom: none; }

  .totals-box {
    display: flex; justify-content: space-between; align-items: center;
    padding: 11px 14px; background: var(--color-brand-muted);
    border-radius: 8px; margin-bottom: 8px;
  }
  .totals-box .t-label { font-size: 0.83rem; font-weight: 600; color: var(--color-muted); }
  .totals-box .t-value { font-size: 0.95rem; font-weight: 700; color: var(--color-brand-dark); font-family: var(--font-mono); }

  .btn-row { display: flex; gap: 10px; }
  .btn {
    flex: 1; padding: 12px 16px; border: none; border-radius: 9px;
    font-size: 0.92rem; font-weight: 700; font-family: var(--font-main);
    cursor: pointer; transition: all 0.18s;
  }
  .btn-ghost {
    background: transparent; border: 1.5px solid var(--color-border); color: var(--color-muted);
  }
  .btn-ghost:hover { border-color: var(--color-brand); color: var(--color-brand-dark); }
  .btn-primary { background: var(--color-brand); color: white; }
  .btn-primary:hover {
    background: var(--color-brand-dark); transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(194,91,63,0.3);
  }
  .btn-primary:disabled { background: var(--color-muted); transform: none; box-shadow: none; cursor: not-allowed; }

  #summary-section { display: none; }
  .empty-state { text-align: center; color: var(--color-muted); font-size: 0.88rem; padding: 24px; }

  @media (max-width: 540px) {
    .row, .row.three { grid-template-columns: 1fr; }
    .date-grid { grid-template-columns: repeat(4, 1fr); }
    .travel-options { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-eyebrow">Tutoring Co.</div>
    <h1>Weekly Session Log</h1>
    <p>Fill this out once at the end of your week. Select only the days you worked.</p>
  </div>

  <div class="card">
    <div class="card-title">Your Info</div>
    <div class="row">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="tutor-name" placeholder="Your name" />
      </div>
      <div class="field">
        <label>Week Starting</label>
        <input type="date" id="week-of" />
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Days Worked</div>
    <p style="font-size:0.83rem;color:var(--color-muted);margin-bottom:14px;">Tap a day to open its session log.</p>
    <div class="date-grid" id="date-grid"></div>
  </div>

  <div id="session-panels"></div>

  <div class="card">
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="generateSummary()">Preview</button>
      <button class="btn btn-primary" id="submit-btn" onclick="submitToSheet()">Submit Week →</button>
    </div>
    <p style="font-size:0.78rem;color:var(--color-muted);margin-top:10px;text-align:center;">
      Responses go directly to your manager's Google Sheet.
    </p>
  </div>

  <div class="card" id="summary-section">
    <div class="card-title">Weekly Summary</div>
    <div id="summary-body"></div>
  </div>

</div>
<script>
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const SESSION_TYPES = [
    { value: 'homework', label: 'Homework Help' },
    { value: 'sat_act',  label: 'SAT / ACT Prep' },
    { value: 'college',  label: 'College App Help' }
  ];
  const TRAVEL_OPTIONS = [
    { value: 'virtual',  label: 'Virtual',  icon: '💻', fee: 0,  feeLabel: 'No fee' },
    { value: 'standard', label: 'Standard', icon: '🚗', fee: 10, feeLabel: '$10' },
    { value: 'extended', label: 'Extended', icon: '📍', fee: 15, feeLabel: '$15 (30+ min)' }
  ];

  const activeDays = new Set();
  const sessionData = {};

  function getWeekDates() {
    const val = document.getElementById('week-of').value;
    const base = val ? new Date(val + 'T00:00:00') : (() => {
      const d = new Date(); d.setDate(d.getDate() - d.getDay()); return d;
    })();
    return Array.from({length:7}, (_,i) => { const d=new Date(base); d.setDate(base.getDate()+i); return d; });
  }
  const fmt = d => d.toISOString().split('T')[0];
  const fmt12 = t => {
    if (!t) return '';
    const [h,m] = t.split(':').map(Number);
    return `${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`;
  };

  function renderDateGrid() {
    const grid = document.getElementById('date-grid');
    grid.innerHTML = '';
    getWeekDates().forEach(d => {
      const key = fmt(d);
      const hasSessions = sessionData[key]?.length > 0;
      const btn = document.createElement('button');
      btn.id = 'daybtn-' + key;
      btn.className = 'day-btn' + (activeDays.has(key)?' active':'') + (hasSessions?' has-sessions':'');
      btn.innerHTML = `<span class="day-label">${DAYS[d.getDay()]}</span><span class="day-num">${d.getDate()}</span>`;
      btn.onclick = () => toggleDay(key, d);
      grid.appendChild(btn);
    });
  }

  function toggleDay(key, d) {
    if (activeDays.has(key)) {
      activeDays.delete(key);
      const panel = document.getElementById('panel-'+key);
      if (panel) { panel.classList.remove('open'); setTimeout(()=>panel.remove(), 220); }
    } else {
      activeDays.add(key);
      if (!sessionData[key]) sessionData[key] = [];
      buildDayPanel(key, d);
    }
    refreshDayBtn(key);
  }

  function refreshDayBtn(key) {
    const btn = document.getElementById('daybtn-'+key);
    if (!btn) return;
    const hasSessions = sessionData[key]?.length > 0;
    btn.className = 'day-btn'+(activeDays.has(key)?' active':'')+(hasSessions?' has-sessions':'');
  }

  function buildDayPanel(key, d) {
    const label = d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    const div = document.createElement('div');
    div.className = 'card day-panel open';
    div.id = 'panel-'+key;
    div.innerHTML = `
      <div class="day-panel-header">
        <span class="day-panel-title">${label}</span>
        <button class="close-day" onclick="toggleDay('${key}', new Date('${key}T00:00:00'))">✕ Close</button>
      </div>
      <div id="sessions-${key}"></div>
      <button class="add-session-btn" onclick="addSession('${key}')">+ Add Another Session</button>
    `;
    document.getElementById('session-panels').appendChild(div);
    if (sessionData[key].length === 0) addSession(key);
    else sessionData[key].forEach((_,i) => renderSession(key,i));
  }

  function addSession(key) {
    const idx = sessionData[key].length;
    sessionData[key].push({ student:'', start:'', end:'', travel:'virtual', sessionType:'homework', notes:'' });
    renderSession(key, idx);
    refreshDayBtn(key);
  }

  function renderSession(key, idx) {
    const existing = document.getElementById(`sess-${key}-${idx}`);
    if (existing) existing.remove();
    const s = sessionData[key][idx];

    // Travel options
    const travelHTML = TRAVEL_OPTIONS.map(opt => `
      <div class="travel-option">
        <input type="radio" name="travel-${key}-${idx}" id="travel-${key}-${idx}-${opt.value}"
          value="${opt.value}" ${s.travel===opt.value?'checked':''}
          onchange="upd('${key}',${idx},'travel','${opt.value}')"/>
        <label for="travel-${key}-${idx}-${opt.value}">
          <span class="travel-icon">${opt.icon}</span>
          ${opt.label}
          <span class="travel-fee">${opt.feeLabel}</span>
        </label>
      </div>`).join('');

    // Session type dropdown
    const typeDropdown = `
      <select onchange="upd('${key}',${idx},'sessionType',this.value)">
        ${SESSION_TYPES.map(t =>
          `<option value="${t.value}" ${s.sessionType===t.value?'selected':''}>${t.label}</option>`
        ).join('')}
      </select>`;

    const block = document.createElement('div');
    block.className = 'session-block';
    block.id = `sess-${key}-${idx}`;
    block.innerHTML = `
      <div class="session-header">
        <span class="session-label">
          Session ${idx+1}
          <span id="dur-badge-${key}-${idx}" class="dur-badge" style="display:${s.start&&s.end?'inline':'none'}">${calcDurLabel(s.start,s.end)}</span>
        </span>
        ${idx>0?`<button class="remove-btn" onclick="removeSession('${key}',${idx})">✕ Remove</button>`:''}
      </div>

      <div class="row" style="margin-bottom:14px;">
        <div class="field" style="margin-bottom:0">
          <label>Student Name</label>
          <input type="text" placeholder="Student's name" value="${s.student}"
            oninput="upd('${key}',${idx},'student',this.value)" />
        </div>
        <div class="field" style="margin-bottom:0">
          <label>Session Type</label>
          ${typeDropdown}
        </div>
      </div>

      <div class="row three" style="margin-bottom:14px;">
        <div class="field" style="margin-bottom:0">
          <label>Start Time</label>
          <input type="time" value="${s.start}"
            oninput="upd('${key}',${idx},'start',this.value);updateDur('${key}',${idx})" />
        </div>
        <div class="field" style="margin-bottom:0">
          <label>End Time</label>
          <input type="time" value="${s.end}"
            oninput="upd('${key}',${idx},'end',this.value);updateDur('${key}',${idx})" />
        </div>
        <div class="field" style="margin-bottom:0">
          <label>Duration</label>
          <input type="text" readonly id="dur-${key}-${idx}" value="${calcDurLabel(s.start,s.end)}" placeholder="Auto" />
        </div>
      </div>

      <div class="field">
        <label>Travel / Location</label>
        <div class="travel-options">${travelHTML}</div>
      </div>

      <div class="field">
        <label>Notes <span style="font-weight:400;color:var(--color-muted)">(optional)</span></label>
        <textarea placeholder="e.g. makeup session, student needs extra practice…"
          oninput="upd('${key}',${idx},'notes',this.value)">${s.notes}</textarea>
      </div>
    `;
    document.getElementById('sessions-'+key).appendChild(block);
  }

  function upd(key, idx, field, val) { sessionData[key][idx][field] = val; }

  function updateDur(key, idx) {
    const s = sessionData[key][idx];
    const lbl = calcDurLabel(s.start, s.end);
    const d = document.getElementById(`dur-${key}-${idx}`);
    const b = document.getElementById(`dur-badge-${key}-${idx}`);
    if (d) d.value = lbl;
    if (b) { b.textContent = lbl; b.style.display = lbl ? 'inline' : 'none'; }
  }

  function removeSession(key, idx) {
    sessionData[key].splice(idx, 1);
    document.getElementById('sessions-'+key).innerHTML = '';
    sessionData[key].forEach((_,i) => renderSession(key,i));
    refreshDayBtn(key);
  }

  function calcMins(s,e) {
    if (!s||!e) return 0;
    const [sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);
    return Math.max(0,(eh*60+em)-(sh*60+sm));
  }
  function calcDurLabel(s,e) {
    const m=calcMins(s,e); if(!m) return '';
    const h=Math.floor(m/60),mn=m%60;
    return h>0?`${h}h${mn>0?' '+mn+'m':''}`:mn+'m';
  }
  function calcHours(s,e) { return calcMins(s,e)/60; }
  function getTravelFee(val) { return TRAVEL_OPTIONS.find(o=>o.value===val)?.fee||0; }
  function getTravelLabel(val) { return TRAVEL_OPTIONS.find(o=>o.value===val)?.label||''; }
  function getTypeLabel(val) { return SESSION_TYPES.find(t=>t.value===val)?.label||val; }

  function collectRows() {
    const rows = [];
    [...activeDays].sort().forEach(key => {
      (sessionData[key]||[]).forEach(s => {
        rows.push({
          date: key,
          student: s.student||'—',
          start: s.start, end: s.end,
          hours: calcHours(s.start, s.end),
          durLabel: calcDurLabel(s.start,s.end)||'—',
          travelType: s.travel,
          travelFee: getTravelFee(s.travel),
          travelLabel: getTravelLabel(s.travel),
          sessionType: getTypeLabel(s.sessionType),
          notes: s.notes||''
        });
      });
    });
    return rows;
  }

  function generateSummary() {
    const name = document.getElementById('tutor-name').value.trim()||'Tutor';
    const rows = collectRows();
    const section = document.getElementById('summary-section');
    const body = document.getElementById('summary-body');
    if (!rows.length) {
      body.innerHTML='<div class="empty-state">No sessions logged yet.</div>';
      section.style.display='block'; section.scrollIntoView({behavior:'smooth'}); return;
    }
    let totalHrs=0, totalTravel=0;
    const trs = rows.map(r => {
      totalHrs+=r.hours; totalTravel+=r.travelFee;
      return `<tr>
        <td>${r.date}</td>
        <td>${r.student}</td>
        <td>${r.sessionType}</td>
        <td>${fmt12(r.start)}–${fmt12(r.end)}</td>
        <td>${r.durLabel}</td>
        <td>${r.travelLabel}${r.travelFee>0?' ($'+r.travelFee+')':''}</td>
      </tr>`;
    }).join('');
    body.innerHTML=`
      <table class="summary-table">
        <thead><tr><th>Date</th><th>Student</th><th>Type</th><th>Time</th><th>Duration</th><th>Travel</th></tr></thead>
        <tbody>${trs}</tbody>
      </table>
      <div class="totals-box"><span class="t-label">Tutor</span><span class="t-value">${name}</span></div>
      <div class="totals-box"><span class="t-label">Total Hours</span><span class="t-value">${totalHrs.toFixed(2)} hrs</span></div>
      <div class="totals-box"><span class="t-label">Total Travel Fees</span><span class="t-value">$${totalTravel.toFixed(2)}</span></div>
    `;
    section.style.display='block'; section.scrollIntoView({behavior:'smooth'});
  }

  async function submitToSheet() {
    const name = document.getElementById('tutor-name').value.trim();
    const week = document.getElementById('week-of').value;
    if (!name||!week) { alert('Please fill in your name and week first.'); return; }
    const rows = collectRows();
    if (!rows.length) { alert('No sessions logged yet.'); return; }

    const SCRIPT_URL = 'PASTE_YOUR_APPS_SCRIPT_URL_HERE';

    const payload = {
      tutorName: name, weekOf: week,
      sessions: rows.map(r => ({
        date: r.date,
        student: r.student,
        sessionType: r.sessionType,
        start: fmt12(r.start),
        end: fmt12(r.end),
        hours: r.hours.toFixed(2),
        travelType: r.travelLabel,
        travelFee: r.travelFee,
        notes: r.notes
      }))
    };

    const btn = document.getElementById('submit-btn');
    btn.textContent = 'Submitting…'; btn.disabled = true;

    try {
      await fetch(SCRIPT_URL, {
        method:'POST', mode:'no-cors',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(payload)
      });
      btn.textContent = '✓ Submitted!';
      btn.style.background = 'var(--color-success)';
      alert('Submitted! Your week has been logged.');
    } catch(err) {
      alert('Something went wrong. Try again.');
      btn.textContent = 'Submit Week →'; btn.disabled = false;
    }
  }

  document.getElementById('week-of').addEventListener('change', renderDateGrid);
  (() => {
    const d = new Date(); d.setDate(d.getDate()-d.getDay());
    document.getElementById('week-of').value = fmt(d);
  })();
  renderDateGrid();
</script>
</body>
</html>
